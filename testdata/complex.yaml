title: My TEST Computer
theme: dark    # "dark" (default) or "light"
refresh: 1m   # auto-reload interval; omit to disable

# Defaults are used when nothing is defined at the slot level. They can be overridden by defining rules directly on a slot.
defaults:
  rules:
    - match:
        code: 0
      status: { id: ok, label: "✅" }
    - match: {}
      status: { id: error, label: "❌" }

# YAML anchors: reusable fragments ilias doesn't interpret directly... 
# it's all just yaml
_anchors:
  pct_rules: &pct_rules           # works for disk, memory, CPU …
    - match:
        output: "^[0-6]\\d%$|^[0-9]%$"
      status: { id: ok, label: "✅ <70%" }
    - match:
        output: "^[7-8]\\d%$"
      status: { id: warn, label: "⚠️ 70–89%" }
    - match: {}
      status: { id: critical, label: "🔴 ≥90%" }

groups:
  - name: System
    tiles:
      - name: Uptime
        icon: https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/linux.svg  # local file or URL, embedded as data URI
        # link: optional URL makes the whole tile clickable
        slots:
          - name: uptime
            check: uptime           # string shorthand. type inferred as "command"
            # rules inherited from defaults (code 0 -> ✅, catch-all -> ❌)

      - name: Disk (root)
        slots:
          - name: usage
            check: "df / --output=pcent | tail -1 | tr -d ' '"
            rules: *pct_rules       # YAML anchor — see _anchors above

      - name: Disk (/home)
        slots:
          - name: usage
            check: "df /home --output=pcent | tail -1 | tr -d ' '"
            rules: *pct_rules
    
      - name: Memory
        slots: # combine anchors and default rules as well as check shorthands
          - name: usage
            check: "free | awk '/^Mem:/ {printf \"%.0f%\", $3/$2 * 100}'"
            rules: *pct_rules
          - name: available
            check: "free -h | awk '/^Mem:/ {print $7 \" free\"}'"
            # uses default rules
          - name: total
            check: "free -h | awk '/^Mem:/ {print $2 \" total\"}'"
            # uses default rules

  - name: Network
    tiles:
      - name: Gateway
        slots:
          - name: ping
            check: "ping -c 1 -W 1 google.com"
            # rules inherited from defaults

      - name: example.com
        link: https://example.com  # makes the whole tile clickable
        slots:
          - name: reachable
            check:                    # type inferred as "http" from target URL
              target: https://example.com
              timeout: 5s
            rules:
              - match:
                  code: 200               # exact HTTP status code
                  output: "Example Domain" # optional: regex on response body
                status: { id: ok, label: "✅" }
              - match:
                  code: "5\\d\\d"         # regex on status code
                status: { id: error, label: "🔴 5xx" }
              - match:
                  output: "certificate|x509|tls"  # output rules also match connection errors
                status: { id: cert-error, label: "🔒 cert error" }
              - match: {}
                status: { id: down, label: "🔴" }

  - name: Metrics
    tiles:
      # generate runs a shell command before rendering.
      # banner embeds a full-width image in the tile.
      - name: Some generated image
        banner:
          src: /tmp/generated_image1.svg
          type: image             # currently the only type; may be omitted
        generate:
          # pretending to generate a meaningful image here. Replace with your actual image generation.
          command: >-
            printf '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 32"><defs><linearGradient id="g"
            x1="0" y1="0" x2="1" y2="0"><stop offset="0%%" stop-color="#2ecc71"/><stop offset="60%%"
            stop-color="#f1c40f"/><stop offset="100%%" stop-color="#e74c3c"/></linearGradient></defs><rect
            width="400" height="32" rx="6" fill="url(#g)"/></svg>' > /tmp/generated_image1.svg
          timeout: 5s

      # generate + banner + slots can all be combined on one tile
      - name: Another generated image
        banner:
          src: /tmp/generated_image2.svg
        generate:
          command: >-
            printf '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 32"><defs><linearGradient id="g"
            x1="0" y1="0" x2="1" y2="0"><stop offset="0%%" stop-color="#3498db"/><stop offset="100%%"
            stop-color="#9b59b6"/></linearGradient></defs><rect width="400" height="32" rx="6"
            fill="url(#g)"/></svg>' > /tmp/generated_image2.svg
          timeout: 5s
        slots:
          - name: io
            check: "vmstat 1 2 | tail -1 | awk '{print \"bi=\" $9 \" bo=\" $10 \" kB/s\"}'"
            # rules inherited from defaults