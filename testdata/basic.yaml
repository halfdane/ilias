title: My Dashboard

groups:
  - name: Services
    tiles:
      - name: Web Server
        slots:
          - name: status
            check:
              type: command
              target: "echo ok"
            rules:
              - match:
                  code: 0
                status: { id: ok, label: "✅" }
              - match: {}
                status: { id: error, label: "❌" }
